<svg xmlns="http://www.w3.org/2000/svg" width="980" height="340" viewBox="0 0 980 340" font-family="'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <style>
      .title{font-weight:800;font-size:18px;fill:#141210;}
      .desc{font-size:13px;fill:#5d574e;}
      .code{font-family:'SFMono-Regular',ui-monospace,Menlo,Consolas,monospace;font-size:11px;fill:#7fe3a1;}
      .num{font-weight:800;font-size:15px;fill:#ffffff;}
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L6,3 L0,6 Z" fill="#2D6BFF"/>
    </marker>
  </defs>

  <rect x="1" y="1" width="978" height="338" rx="22" fill="#FFFFFF" stroke="#E4E8F0" stroke-width="2"/>

  <text x="40" y="50" font-weight="800" font-size="22" fill="#141210">agent<tspan fill="#2D6BFF">·</tspan>domains <tspan fill="#5d574e" font-weight="700" font-size="16">skill</tspan></text>
  <text x="40" y="74" class="desc" font-size="14">A drop-in capability: your agent claims its own public domain, no human in the loop.</text>

  <line x1="248" y1="210" x2="270" y2="210" stroke="#2D6BFF" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="488" y1="210" x2="510" y2="210" stroke="#2D6BFF" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="728" y1="210" x2="750" y2="210" stroke="#2D6BFF" stroke-width="3" marker-end="url(#arrow)"/>

  <!-- 1: install -->
  <rect x="40"  y="100" width="200" height="200" rx="18" fill="#FFFFFF" stroke="#141210" stroke-width="2"/>
  <circle cx="72" cy="138" r="17" fill="#2D6BFF"/>
  <text x="72" y="143" text-anchor="middle" class="num">1</text>
  <text x="100" y="144" class="title">install</text>
  <rect x="56" y="166" width="168" height="30" rx="9" fill="#141210"/>
  <text x="66" y="186" class="code">/plugin marketplace add</text>
  <text x="56" y="228" class="desc">Add the plugin once</text>
  <text x="56" y="248" class="desc">(or npx skills add).</text>

  <!-- 2: agent needs a URL -->
  <rect x="280" y="100" width="200" height="200" rx="18" fill="#FFFFFF" stroke="#141210" stroke-width="2"/>
  <circle cx="312" cy="138" r="17" fill="#2D6BFF"/>
  <text x="312" y="143" text-anchor="middle" class="num">2</text>
  <text x="340" y="144" class="title">agent decides</text>
  <rect x="296" y="166" width="168" height="30" rx="9" fill="#EEF1F6"/>
  <text x="308" y="186" font-size="12" fill="#141210">“I need a public URL”</text>
  <text x="296" y="228" class="desc">The skill loads only</text>
  <text x="296" y="248" class="desc">when it's relevant.</text>

  <!-- 3: claim -->
  <rect x="520" y="100" width="200" height="200" rx="18" fill="#FFFFFF" stroke="#141210" stroke-width="2"/>
  <circle cx="552" cy="138" r="17" fill="#2D6BFF"/>
  <text x="552" y="143" text-anchor="middle" class="num">3</text>
  <text x="580" y="144" class="title">claim</text>
  <rect x="536" y="166" width="168" height="30" rx="9" fill="#141210"/>
  <text x="548" y="186" class="code">agentdomains claim myapp</text>
  <text x="536" y="228" class="desc">Signup + claim run</text>
  <text x="536" y="248" class="desc">with no human.</text>

  <!-- 4: live -->
  <rect x="760" y="100" width="200" height="200" rx="18" fill="#FFFFFF" stroke="#2D6BFF" stroke-width="2"/>
  <circle cx="792" cy="138" r="17" fill="#16a34a"/>
  <text x="792" y="144" text-anchor="middle" class="num">✓</text>
  <text x="820" y="144" class="title">live</text>
  <rect x="776" y="166" width="168" height="30" rx="9" fill="#141210"/>
  <text x="788" y="186" class="code">myapp.agentdomains.co</text>
  <text x="776" y="228" class="desc">Wired up by the agent,</text>
  <text x="776" y="248" class="desc">ready to serve. ✨</text>
</svg>
